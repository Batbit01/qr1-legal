<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Digital Product Label · Wine</title>

  <!-- NO tracking, NO analytics, NO cookies — cumplimiento Reg. (UE) 2021/2117 -->
  <meta name="robots" content="noindex" />

  <style>
    :root {
      --brand: #2a2a2a;       /* primario — títulos, cabeceras, hero (override desde JSON). Neutro por defecto para evitar flash de color hasta que cargue el tema. */
      --accent: #d4af37;      /* secundario — badges, bordes destacados */
      --bg: #faf9f7;
      --ink: #1a1a1a;
      --ink-soft: #55504e;
      --ink-light: #8a8480;
      --line: rgba(0,0,0,0.08);
      --line-soft: rgba(0,0,0,0.05);
      --card: #ffffff;
      --radius: 14px;
      --maxw: 560px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
      font-size: 15px;
      padding: 20px 16px 48px;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: var(--maxw); margin: 0 auto; }

    /* Header */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 0 0 12px;
    }
    .bodega-logo { height: 28px; max-width: 140px; object-fit: contain; }
    .bodega-logo:not([src]), .bodega-logo[src=""] { display: none; }
    .top-actions { display: flex; align-items: center; gap: 8px; }
    .theme-btn {
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ink-soft);
      cursor: pointer;
    }
    .theme-btn svg { width: 14px; height: 14px; }
    .theme-btn:hover { background: rgba(0,0,0,0.04); }
    .lang-wrap {
      position: relative;
    }
    .lang-select {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 6px 28px 6px 30px;
      font-size: 13px;
      color: var(--ink);
      cursor: pointer;
      font-family: inherit;
    }
    .lang-wrap::before {
      content: "🌐";
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      font-size: 13px; pointer-events: none;
    }
    .lang-wrap::after {
      content: "▾";
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: var(--ink-light); pointer-events: none;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 14px 12px 22px;
      border-bottom: 1px solid var(--line-soft);
      margin-bottom: 8px;
    }
    .title {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-light);
      font-weight: 600;
      margin: 0 0 10px;
    }
    .subtitle {
      font-size: 11px;
      color: var(--ink-light);
      margin: 0 0 14px;
      line-height: 1.45;
    }
    .wine-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand);
      margin: 6px 0 4px;
      letter-spacing: -0.01em;
    }
    .wine-meta {
      font-size: 13px;
      color: var(--ink-soft);
      display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    }
    .wine-meta span + span::before { content: "·"; margin-right: 6px; color: var(--ink-light); }

    /* Section card */
    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin: 12px 0;
    }
    /* Título de sección · estilo "divider con etiqueta centrada"
       (línea horizontal con el título en el medio, tipo separator). */
    .section h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-weight: 700;
      color: var(--ink);
      margin: 4px 0 14px;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: var(--brand-font, inherit);
    }
    .section h2::before,
    .section h2::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .section p { margin: 0; color: var(--ink); }

    /* Ingredients with highlighted allergens */
    .ingredients { font-size: 14px; line-height: 1.6; color: var(--ink); }

    /* Ingredientes por categorías · estructura EU 2117 (Digital Label style) */
    .ingredients-groups {
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ingredients-group {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 2px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line-soft);
    }
    .ingredients-group:last-child { border-bottom: 0; }
    .ingredients-group-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.01em;
      margin: 0;
    }
    .ingredients-group-items {
      font-size: 14px;
      color: var(--ink);
      margin: 2px 0 0;
      line-height: 1.5;
    }
    .ingredients-group-items strong {
      font-weight: 600;
    }
    .ingredients strong { font-weight: 700; color: var(--ink); }

    /* Nutrition table */
    table.nutrition {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    /* La cabecera de la tabla NO es un separador de bloque: usaba fondo brand
       y se confundía con el título de sección. Ahora: sin fondo, solo línea
       inferior sutil. El "separador de bloque" lo hace .section h2. */
    table.nutrition thead tr {
      background: transparent;
      color: var(--ink-soft);
      border-bottom: 1px solid var(--line);
    }
    table.nutrition thead th {
      padding: 6px 10px;
      text-align: right;
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    table.nutrition thead th:first-child { text-align: left; }
    table.nutrition tbody th,
    table.nutrition tbody td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--line-soft);
      vertical-align: top;
    }
    table.nutrition tbody th {
      text-align: left;
      font-weight: 500;
      color: var(--ink-soft);
    }
    table.nutrition tbody td {
      text-align: right;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    table.nutrition tr.sub th { padding-left: 22px; color: var(--ink-light); font-weight: 400; }
    table.nutrition tbody tr:last-child th,
    table.nutrition tbody tr:last-child td { border-bottom: none; }

    /* Tech info grid */
    .tech-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 20px;
      font-size: 13px;
    }
    .tech-grid dt {
      color: var(--ink-light);
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.08em;
      margin: 0;
    }
    .tech-grid dd { margin: 0 0 6px; color: var(--ink); font-weight: 500; }

    /* Pictograms hero (arriba, sin caja — como AECOC) */
    .pictos-hero {
      display: flex; gap: 14px;
      justify-content: center; align-items: flex-start;
      margin: 16px 0 4px;
    }
    .picto-hero {
      display: inline-flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 9px;
      color: var(--ink-light);
      text-align: center;
      line-height: 1.2;
      max-width: 80px;
    }
    .picto-hero svg,
    .picto-hero img { width: 60px; height: 60px; object-fit: contain; }

    /* Recycling icons (triangle with code — símbolo universal) */
    .recycling {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      margin-top: 10px;
    }
    .recycle-icon {
      display: inline-flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 10px; color: var(--ink); font-weight: 600;
      letter-spacing: 0.02em;
    }
    .recycle-icon svg { width: 64px; height: 60px; }

    /* Pictogramas v2 son SVG bicolor con colores explícitos · NO se invierten
       en modo oscuro porque el rojo institucional y el negro deben quedar
       fieles. Solo aplicamos fondo blanco al lienzo para contraste si hay
       tema oscuro de bodega. */
    body.theme-dark .pictos-warning .picto-hero img {
      background: #fff;
      border-radius: 50%;
    }

    /* Wine in Moderation badge · logo oficial centrado */
    .wine-moderation {
      display: block;
      max-width: 240px;
      margin: 18px auto 4px;
      text-align: center;
    }
    .wine-moderation img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* Iconos reciclaje en VERDE institucional (norma simbólica) */
    .recycling .recycle-icon { color: #1f9a3a; }
    .recycling .recycle-icon span { color: var(--ink); }
    .recycle-icon svg text { fill: #1f9a3a !important; }

    /* Attribute icons — logos oficiales universales (V-Label vegan,
       V-Label vegetarian, EU Organic Eurohoja) con texto debajo.
       Reemplaza los chips pill de antes. Mismo layout que .cert-item
       para coherencia visual con las certificaciones de la bodega. */
    .attrs { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; margin-top: 6px; padding: 8px 0 2px; }
    .attr-icon {
      display: inline-flex; flex-direction: column; align-items: center; gap: 4px;
      max-width: 92px;
    }
    .attr-icon img {
      max-height: 56px; max-width: 56px; object-fit: contain;
    }
    .attr-icon span {
      font-size: 10px;
      color: var(--ink-soft);
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
      line-height: 1.25;
    }

    /* Certifications row — logos subidos por la bodega (DOP, bio, vegan...) */
    .certs {
      display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
      padding: 12px 4px 2px;
    }
    .cert-item {
      display: inline-flex; flex-direction: column; align-items: center; gap: 4px;
      max-width: 90px;
    }
    .cert-item img {
      max-height: 50px; max-width: 80px; object-fit: contain;
      filter: grayscale(0.1);
    }
    .cert-item span {
      font-size: 9px; color: var(--ink-light);
      text-align: center; line-height: 1.3;
    }

    /* Footer — responsible drinking + fuente info */
    footer {
      margin-top: 22px;
      text-align: center;
      font-size: 11px;
      color: var(--ink-light);
      line-height: 1.55;
    }
    footer .responsible {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 10px;
      background: #fff;
      font-weight: 600;
      color: var(--ink-soft);
    }
    footer .eu-regulation {
      opacity: 0.7;
      font-size: 10px;
      margin-top: 8px;
    }

    /* ─── Hero · estilo Digital Label (logo + foto + identidad) ─── */
    .hero-brand {
      text-align: center;
      padding: 24px 0 8px;
    }
    .hero-brand .brand-logo-big {
      max-height: 80px;
      max-width: 220px;
      object-fit: contain;
      display: inline-block;
    }
    .hero-brand .brand-logo-big:not([src]),
    .hero-brand .brand-logo-big[src=""] { display: none; }
    .hero-brand .brand-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand);
      margin: 6px 0 0;
    }
    .hero-bottle {
      text-align: center;
      padding: 18px 0 8px;
    }
    .hero-bottle .bottle-img {
      max-height: 240px;
      max-width: 60%;
      object-fit: contain;
      display: inline-block;
      filter: drop-shadow(0 12px 22px rgba(0,0,0,0.18));
    }
    .hero-bottle .bottle-img:not([src]),
    .hero-bottle .bottle-img[src=""] { display: none; }

    .hero-identity {
      text-align: center;
      padding: 16px 4px 22px;
      border-bottom: 1px solid var(--line-soft);
      margin-bottom: 12px;
    }
    .hero-identity .bodega-line {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.02em;
      margin: 0 0 8px;
      font-family: var(--brand-font, inherit);
    }
    .hero-identity .wine-name-big {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1.05;
      margin: 0;
      font-family: var(--brand-font, inherit);
    }
    .hero-identity .wine-year-big {
      font-size: 28px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.05;
      margin: 2px 0 14px;
      font-family: var(--brand-font, inherit);
    }
    .hero-identity .wine-essentials {
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.7;
    }
    .hero-identity .wine-essentials > div { margin: 2px 0; }

    /* Footer SommelierLab */
    .sl-footer {
      margin-top: 32px;
      padding: 18px 0 8px;
      text-align: center;
      font-size: 11px;
      color: var(--ink-light);
      border-top: 1px solid var(--line-soft);
    }
    .sl-footer strong { color: var(--ink-soft); font-weight: 700; letter-spacing: 0.04em; }

    /* Skeleton loading */
    .skel { background: linear-gradient(90deg, #eee 0%, #f5f5f5 50%, #eee 100%); background-size: 200% 100%; animation: skel 1.2s infinite; color: transparent !important; border-radius: 6px; }
    @keyframes skel { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* Splash de carga — oculta el flash de UI sin tematizar */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px;
      background: var(--bg);
      color: var(--ink-light);
      transition: opacity .35s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .spinner {
      width: 26px; height: 26px;
      border: 2px solid rgba(0,0,0,0.08);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #splash .splash-bodega { font-size: 13px; letter-spacing: 0.04em; opacity: 0.7; }
    #splash img { max-height: 32px; max-width: 160px; object-fit: contain; opacity: 0.85; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <img id="splashLogo" alt="" style="display:none;" />
    <div class="splash-bodega" id="splashBodega"></div>
    <div class="spinner" aria-hidden="true"></div>
  </div>
  <main>

    <!-- Top bar: logo + theme toggle + language selector -->
    <div class="top-bar">
      <img class="bodega-logo" id="bodegaLogo" alt="" />
      <div class="top-actions">
        <button type="button" id="themeBtn" class="theme-btn" aria-label="Cambiar tema"></button>
        <div class="lang-wrap">
          <select id="lang" class="lang-select" aria-label="Language"></select>
        </div>
      </div>
    </div>

    <!-- Hero: logo bodega grande -->
    <section class="hero-brand">
      <img class="brand-logo-big" id="brandLogoBig" alt="" />
      <p class="brand-name" id="brandName" style="display:none;"></p>
    </section>

    <!-- Hero: foto botella destacada -->
    <section class="hero-bottle">
      <img class="bottle-img" id="bottleImg" alt="" />
    </section>

    <!-- Hero: identidad del vino · nombre + añada + variedades + graduación -->
    <section class="hero-identity">
      <p class="bodega-line" id="bodegaLine"></p>
      <h1 class="wine-name-big" id="wineNameBig">—</h1>
      <p class="wine-year-big" id="wineYearBig"></p>
      <div class="wine-essentials">
        <div id="wineVarieties"></div>
        <div id="wineAlcohol"></div>
        <div id="wineCategoryLine"></div>
      </div>
    </section>

    <!-- Etiqueta legal (oculta visualmente, mantiene contrato) -->
    <p class="title" id="title" style="display:none;">DIGITAL PRODUCT LABEL</p>
    <p class="subtitle" id="subtitle" style="display:none;"></p>
    <span id="wineName" style="display:none;"></span>
    <span id="wineCategory" style="display:none;"></span>
    <span id="wineYear" style="display:none;"></span>

    <!-- Ingredients -->
    <section class="section">
      <h2 id="ingredientsTitle">INGREDIENTS</h2>
      <div class="ingredients" id="ingredients">—</div>
    </section>

    <!-- Nutrition -->
    <section class="section">
      <h2 id="nutritionTitle">NUTRITION INFORMATION</h2>
      <table class="nutrition">
        <thead>
          <tr><th></th><th id="perBasisTh">per 100 ml</th></tr>
        </thead>
        <tbody id="nutritionTable"></tbody>
      </table>
    </section>

    <!-- Tech info -->
    <section class="section">
      <dl class="tech-grid" id="techGrid"></dl>
    </section>

    <!-- Sostenibilidad · certificados (Vegan/Bio/V-Label/Mobius) -->
    <section class="section" id="sustainabilitySection">
      <h2 id="sustainabilityTitle">SOSTENIBILIDAD</h2>
      <div class="attrs" id="attrsRow"></div>
      <div class="certs" id="certsRow"></div>
    </section>

    <!-- Consumo responsable · pictogramas obligatorios EU en rojo + Wine in Moderation -->
    <section class="section" id="consumoResponsableSection">
      <h2 id="consumoResponsableTitle">CONSUMO RESPONSABLE</h2>
      <div class="pictos-hero pictos-warning" id="pictosHero"></div>
      <a class="wine-moderation" id="wineModerationBadge" href="https://www.wineinmoderation.eu/" target="_blank" rel="noopener noreferrer" aria-label="Wine in Moderation">
        <img src="https://f005.backblazeb2.com/file/SommelierLab-media/qr2/icons/wine-moderation-logo.png" alt="Wine in Moderation · Choose · Share · Care" loading="lazy" />
      </a>
    </section>

    <!-- Reciclaje · iconos coloreados (verde vidrio, amarillo otros, etc) -->
    <section class="section" id="recyclingSection">
      <h2 id="recyclingTitle">RECICLAJE</h2>
      <div class="recycling" id="recyclingRow"></div>
    </section>

    <footer>
      <div class="responsible" id="responsibleText">Drink responsibly</div>
      <div class="eu-regulation">Reg. (UE) 2021/2117</div>
    </footer>

    <div class="sl-footer">
      <p>Powered by <strong>SommelierLab</strong></p>
    </div>

  </main>

  <script>
    /* ─────────────────────────────────────────────────────────────
       Configuración

       Soportamos DOS formatos de URL:
       a) Query string (modo legacy): qr1.sommelierlab.com/?vino_id=V&anyada=A&lang=L
       b) Path bonito (white-label): qr.bodega.com/legal/V/A/L
          Necesario porque cuando una bodega usa custom_domain, el QR
          físico imprime la URL con path. La URL visible en el navegador
          NO lleva querystring — solo el path. Si solo leyéramos del
          querystring, el HTML cargaría sin saber qué vino mostrar.
    ───────────────────────────────────────────────────────────────*/
    const qs = new URLSearchParams(location.search);

    /* Extraer params del path /legal/V/A/L o /V/A/L (fallback). */
    function paramsFromPath() {
      const path = (location.pathname || "").replace(/^\/+|\/+$/g, "");
      const segs = path.split("/").filter(Boolean);
      // /legal/V/A/L → ['legal','V','A','L']
      // /legal/V/A   → ['legal','V','A']
      // /V/A/L       → ['V','A','L']
      const start = segs[0] === "legal" ? 1 : 0;
      const v = segs[start] || "";
      const a = segs[start + 1] || "";
      const l = segs[start + 2] || "";
      // Validación: vino_id alfanumérico, anyada 4 dígitos, lang 2 letras
      const validV = /^[A-Za-z0-9_-]{1,30}$/.test(v) ? v : "";
      const validA = /^\d{4}$/.test(a) ? a : "";
      const validL = /^[a-z]{2}$/.test(l) ? l : "";
      return { v: validV, a: validA, l: validL };
    }
    const fromPath = paramsFromPath();

    const OVERRIDE_CDN = qs.get("cdn");
    const CDN_BASE = OVERRIDE_CDN || "https://f005.backblazeb2.com/file/SommelierLab-media";
    const PREFIX_QR1 = "qr1";
    const LABELS_URL = "https://qr1.sommelierlab.com/qr1.labels.ue.json";

    const vinoId = qs.get("id") || qs.get("vino_id") || qs.get("vino") || fromPath.v || "";
    const anyada = qs.get("anyada") || qs.get("year") || fromPath.a || "";
    const fileOverride = qs.get("file"); // testing: &file=https://.../data.json
    const PREVIEW_MODE = qs.get("preview") === "1"; // dashboard live preview via postMessage

    /* 24 UE + 3 cooficiales españolas */
    const LANGS = ["es","ca","eu","gl","bg","cs","da","de","el","en","et","fi","fr","ga","hr","it","lv","lt","hu","mt","nl","pl","pt","ro","sk","sl","sv"];
    const NATIVE = {
      bg:"Български", cs:"Čeština", da:"Dansk", de:"Deutsch", et:"Eesti", el:"Ελληνικά",
      en:"English", es:"Español", fr:"Français", ga:"Gaeilge", hr:"Hrvatski", it:"Italiano",
      lv:"Latviešu", lt:"Lietuvių", hu:"Magyar", mt:"Malti", nl:"Nederlands", pl:"Polski",
      pt:"Português", ro:"Română", sk:"Slovenčina", sl:"Slovenščina", fi:"Suomi", sv:"Svenska",
      ca:"Català", eu:"Euskara", gl:"Galego"
    };
    const FALLBACKS = ["es", "en"];

    /* ─────────────────────────────────────────────────────────────
       Estado
    ───────────────────────────────────────────────────────────────*/
    let LABELS = null;
    let WINE = null;
    let activeLang = "en";
    let PREVIEW_DATA = null; // relleno por postMessage en modo ?preview=1

    /* ─────────────────────────────────────────────────────────────
       Helpers
    ───────────────────────────────────────────────────────────────*/
    const $ = id => document.getElementById(id);
    const norm = s => String(s || "").trim().toLowerCase().slice(0, 5);
    const inLangs = l => LANGS.includes(l);
    const t = key => (LABELS?.[activeLang]?.[key]) || (LABELS?.en?.[key]) || key;

    function detectInitialLang() {
      const fromUrl = (qs.get("lang") || qs.get("idioma") || "").slice(0, 2).toLowerCase();
      const fromPathLang = (fromPath.l || "").slice(0, 2).toLowerCase();
      const fromLS = (localStorage.getItem("qr1.lang") || "").slice(0, 2).toLowerCase();
      const fromNav = (navigator.language || "en").slice(0, 2).toLowerCase();
      return [fromUrl, fromPathLang, fromLS, fromNav, "en"].find(l => l && inLangs(l)) || "en";
    }

    /* ─────────────────────────────────────────────────────────────
       Carga labels UI (una vez)
    ───────────────────────────────────────────────────────────────*/
    async function loadLabels() {
      try {
        const r = await fetch(LABELS_URL, { cache: "no-store" });
        if (!r.ok) throw 0;
        LABELS = await r.json();
      } catch {
        LABELS = {}; // fallback degradado
      }
    }

    /* ─────────────────────────────────────────────────────────────
       Carga datos del vino
    ───────────────────────────────────────────────────────────────*/
    async function loadWineData(lang) {
      if (PREVIEW_MODE) {
        // En modo preview, los datos llegan por postMessage desde el dashboard.
        // Devolvemos lo último recibido o un placeholder vacío.
        return { lang, data: PREVIEW_DATA || { nombre: "— Esperando datos del editor —" } };
      }
      if (fileOverride) {
        const r = await fetch(fileOverride, { cache: "no-store" });
        if (!r.ok) throw new Error("No se pudo cargar file override");
        return { lang, data: await r.json() };
      }
      if (!vinoId) throw new Error("Falta vino_id en la URL");

      const chain = [lang, ...FALLBACKS.filter(l => l !== lang)];
      for (const l of chain) {
        const url = `${CDN_BASE}/${PREFIX_QR1}/${encodeURIComponent(vinoId)}/${l}.json`;
        try {
          const r = await fetch(url, { cache: "no-store" });
          if (r.ok) return { lang: l, data: await r.json() };
        } catch { /* try next */ }
      }
      throw new Error("No disponible en los idiomas probados");
    }

    function loadGoogleFont(id) {
      const f = FONT_LIBRARY[id];
      if (!f) return null;
      const href = `https://fonts.googleapis.com/css2?family=${f.label}:wght@${f.weights.join(";")}&display=swap`;
      let link = document.getElementById("sl-google-fonts");
      if (!link) {
        link = document.createElement("link");
        link.id = "sl-google-fonts";
        link.rel = "stylesheet";
        document.head.appendChild(link);
      }
      if (link.href !== href) link.href = href;
      return f.family;
    }

    function applyTheme(w) {
      const root = document.documentElement.style;
      const rx = /^#[0-9a-fA-F]{6}$/;
      const hex = (v) => rx.test(String(v || "")) ? v : null;

      const brand = hex(w?.bodega?.color_primario) || hex(w?.color_primario);
      const accent = hex(w?.bodega?.color_accent) || hex(w?.color_accent);
      const bg = hex(w?.bodega?.color_fondo) || hex(w?.color_fondo);
      const mode = (w?.bodega?.tema || w?.tema || "").toLowerCase();
      THEME_DEFAULT = (mode === "dark" || mode === "oscuro") ? "dark" : "light";

      if (brand) root.setProperty("--brand", brand);
      if (accent) root.setProperty("--accent", accent);

      /* Fuente de marca heredada del tema QR2 (font_titulos es un id de
         FONT_LIBRARY persistido en BD). Si está, cargamos Google Font y
         aplicamos la familia al hero vía variable CSS --brand-font. */
      const fontId = String(w?.bodega?.font_titulos || "").trim();
      const fontFamily = loadGoogleFont(fontId);
      root.setProperty("--brand-font", fontFamily || "inherit");

      applyThemeMode(resolveTheme(), bg);
      renderThemeBtn();
    }

    function applyThemeMode(mode, customBg) {
      const root = document.documentElement.style;
      document.body.classList.toggle("theme-dark", mode === "dark");
      document.body.classList.toggle("theme-light", mode !== "dark");
      if (mode === "dark") {
        root.setProperty("--bg", customBg || "#111111");
        root.setProperty("--ink", "#f3f1ee");
        root.setProperty("--ink-soft", "#c6c0b9");
        root.setProperty("--ink-light", "#8a847e");
        root.setProperty("--card", "#1a1a1a");
        root.setProperty("--line", "rgba(255,255,255,0.08)");
        root.setProperty("--line-soft", "rgba(255,255,255,0.04)");
      } else {
        root.setProperty("--bg", customBg || "#faf9f7");
        root.setProperty("--ink", "#1a1a1a");
        root.setProperty("--ink-soft", "#55504e");
        root.setProperty("--ink-light", "#8a8480");
        root.setProperty("--card", "#ffffff");
        root.setProperty("--line", "rgba(0,0,0,0.08)");
        root.setProperty("--line-soft", "rgba(0,0,0,0.05)");
      }
    }

    function renderThemeBtn() {
      const btn = $("themeBtn");
      if (!btn) return;
      const now = resolveTheme();
      // mostramos el icono del modo opuesto (acción que hace el click)
      btn.innerHTML = now === "dark" ? ICONS.sun : ICONS.moon;
      btn.title = now === "dark" ? "Modo claro" : "Modo oscuro";
    }

    function toggleTheme() {
      const now = resolveTheme();
      THEME_OVERRIDE = now === "dark" ? "light" : "dark";
      try { localStorage.setItem("qr1.theme", THEME_OVERRIDE); } catch {}
      applyThemeMode(THEME_OVERRIDE);
      renderThemeBtn();
    }

    function renderUI() {
      $("title").textContent = t("title") || "DIGITAL PRODUCT LABEL";
      $("subtitle").textContent = t("subtitle") || "";
      $("ingredientsTitle").textContent = t("ingredients") || "INGREDIENTS";
      $("nutritionTitle").textContent = t("nutrition") || "NUTRITION INFORMATION";
      $("perBasisTh").textContent = t("per_100ml") || "per 100 ml";
      if ($("sustainabilityTitle")) $("sustainabilityTitle").textContent = t("sustainability") || "SUSTAINABILITY & CERTIFICATES";
      if ($("consumoResponsableTitle")) $("consumoResponsableTitle").textContent = t("responsible_consumption") || "RESPONSIBLE CONSUMPTION";
      if ($("recyclingTitle")) $("recyclingTitle").textContent = t("recycling_title") || "RECYCLING";
      $("responsibleText").textContent = t("drink_responsibly") || "Drink responsibly";
      document.documentElement.lang = activeLang;
      document.title = `${t("title")} · ${WINE?.nombre || ""}`;
    }

    function renderWine() {
      const w = WINE || {};

      // Theme (brand / accent / fondo / modo) desde JSON
      applyTheme(w);

      // Logo bodega (estático, sin link — solo identidad visual permitida)
      const logoEl = $("bodegaLogo");
      const logoSrc = w.bodega?.logo_url || w.bodega_logo_url || "";
      if (logoSrc) {
        logoEl.src = logoSrc;
        logoEl.alt = w.bodega?.nombre || "";
      }

      // Ocultar splash una vez tenemos los datos del vino + tema aplicado
      const splash = $("splash");
      if (splash && !splash.classList.contains("hide")) {
        const splashLogo = $("splashLogo");
        const splashBodega = $("splashBodega");
        if (logoSrc && splashLogo) { splashLogo.src = logoSrc; splashLogo.style.display = "block"; }
        if (splashBodega) splashBodega.textContent = w.bodega?.nombre || "";
        // Pequeña espera para que se vea el logo + theme antes de fade out
        setTimeout(() => {
          splash.classList.add("hide");
          setTimeout(() => splash.remove(), 400);
        }, 200);
      }

      // Hero · logo bodega grande · si la imagen no existe en CDN,
      // ocultamos <img> y mostramos el nombre en mayúsculas como fallback.
      const brandLogoBig = $("brandLogoBig");
      const brandName = $("brandName");
      const bodegaNombre = w.bodega?.nombre || "";
      const showBrandFallback = () => {
        if (brandLogoBig) brandLogoBig.style.display = "none";
        if (brandName) {
          brandName.textContent = bodegaNombre;
          brandName.style.display = bodegaNombre ? "" : "none";
        }
      };
      if (brandLogoBig) {
        brandLogoBig.alt = ""; // sin alt: evita el "texto roto" si 404
        brandLogoBig.onerror = showBrandFallback;
        brandLogoBig.onload = () => {
          brandLogoBig.style.display = "";
          if (brandName) brandName.style.display = "none";
        };
        if (logoSrc) {
          brandLogoBig.style.display = "";
          brandLogoBig.src = logoSrc;
        } else {
          showBrandFallback();
        }
      }

      // Hero · foto botella
      const bottleImg = $("bottleImg");
      const bottleSrc = w.botella_url || w.imagen_url || w.image_url || "";
      if (bottleImg) {
        bottleImg.alt = "";
        bottleImg.onerror = () => { bottleImg.style.display = "none"; };
        bottleImg.onload = () => { bottleImg.style.display = ""; };
        if (bottleSrc) {
          bottleImg.style.display = "";
          bottleImg.src = bottleSrc;
        } else {
          bottleImg.style.display = "none";
        }
      }

      // Hero · identidad del vino
      const bodegaLine = $("bodegaLine");
      if (bodegaLine) bodegaLine.textContent = w.bodega?.nombre || "";
      $("wineNameBig").textContent = w.nombre || "—";
      $("wineYearBig").textContent = w.anyada || anyada || "";

      // Essentials: variedades · graduación · DOP/categoría
      const variedades = w.variedad || w.varieties || "";
      const wineVarieties = $("wineVarieties");
      if (wineVarieties) {
        wineVarieties.textContent = variedades || "";
        wineVarieties.style.display = variedades ? "" : "none";
      }
      const abvVal = w.alcohol || w.graduacion_texto || w.graduacion || "";
      const wineAlcohol = $("wineAlcohol");
      if (wineAlcohol) {
        const abvText = abvVal ? (String(abvVal).includes("%") ? abvVal : `${abvVal}% vol.`) : "";
        wineAlcohol.textContent = abvText;
        wineAlcohol.style.display = abvText ? "" : "none";
      }
      const cat = w.categoria || w.DOP || w.dop || "";
      const wineCategoryLine = $("wineCategoryLine");
      if (wineCategoryLine) {
        wineCategoryLine.textContent = cat || "";
        wineCategoryLine.style.display = cat ? "" : "none";
      }

      // Compat oculto (mantiene contrato con código heredado)
      $("wineName").textContent = w.nombre || "";
      $("wineCategory").textContent = cat;
      $("wineYear").textContent = w.anyada || anyada || "";

      // Ingredients with allergens highlighted
      renderIngredients(w);

      // Nutrition table
      renderNutrition(w.nutricion || w.nutrition || {});

      // Tech grid
      renderTech(w);

      // Pictograms
      renderPictograms(w.pictogramas || w.pictograms || {});
    }

    function renderIngredients(w) {
      const allergens = Array.isArray(w.alergenos) ? w.alergenos : [];
      const el = $("ingredients");

      function highlightAllergens(text) {
        if (!allergens.length) return escapeHtml(text);
        let html = escapeHtml(text);
        allergens.forEach(a => {
          const safe = escapeHtml(a).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          html = html.replace(new RegExp(`\\b${safe}\\b`, "gi"), m => `<strong>${m}</strong>`);
        });
        return html;
      }

      // Modo estructurado · ingredientes_groups con sub-categorías (Digital Label style)
      const groups = Array.isArray(w.ingredientes_groups) ? w.ingredientes_groups.filter(g => g && Array.isArray(g.items) && g.items.length > 0) : null;
      if (groups && groups.length > 0) {
        const wrap = document.createElement("div");
        wrap.className = "ingredients-groups";
        for (const g of groups) {
          const groupDiv = document.createElement("div");
          groupDiv.className = "ingredients-group";
          const labelEl = document.createElement("p");
          labelEl.className = "ingredients-group-label";
          labelEl.textContent = g.label || g.key || "";
          const itemsEl = document.createElement("p");
          itemsEl.className = "ingredients-group-items";
          itemsEl.innerHTML = highlightAllergens(g.items.join(", "));
          groupDiv.appendChild(labelEl);
          groupDiv.appendChild(itemsEl);
          wrap.appendChild(groupDiv);
        }
        el.innerHTML = "";
        el.appendChild(wrap);
        return;
      }

      // Fallback · texto plano (legacy)
      const text = w.ingredientes_texto || w.ingredientes || w.ingredients || "—";
      if (!allergens.length) {
        el.textContent = text;
        return;
      }
      el.innerHTML = highlightAllergens(text);
    }

    function renderNutrition(n) {
      const tbl = $("nutritionTable");
      tbl.innerHTML = "";
      const w = WINE || {};
      const cantidadNeta = w.volumen || w.volume || "";
      /* Reg. UE 1169/2011 art. 30 · saturadas ⊆ grasas y azúcares ⊆ hidratos.
         Si el bodeguero declara grasas=0 pero no rellena saturadas, mostramos
         saturadas=0g por lógica (no puede haber saturadas sin grasas). Igual
         con azúcares vs hidratos. Solo lo omitimos si el padre tampoco está. */
      const fatVal     = n.fat_g ?? n.grasas_g;
      const satVal     = n.saturates_g ?? n.grasas_saturadas_g;
      const carbsVal   = n.carbs_g ?? n.hidratos_g ?? n.carbohydrates_g;
      const sugarsVal  = n.sugars_g ?? n.azucares_g;
      const satFinal   = (satVal == null || satVal === "") ? (fatVal != null && fatVal !== "" ? 0 : null) : satVal;
      const sugarsFinal = (sugarsVal == null || sugarsVal === "") ? (carbsVal != null && carbsVal !== "" ? 0 : null) : sugarsVal;
      const rows = [
        { key: "energy",        label: t("energy"),        value: formatEnergy(n) },
        { key: "fat",           label: t("fat"),           value: formatNum(fatVal, "g") },
        { key: "saturates",     label: t("saturates"),     value: formatNum(satFinal, "g"), sub: true },
        { key: "carbohydrates", label: t("carbohydrates"), value: formatNum(carbsVal, "g") },
        { key: "sugars",        label: t("sugars"),        value: formatNum(sugarsFinal, "g"), sub: true },
        { key: "protein",       label: t("protein"),       value: formatNum(n.protein_g ?? n.proteinas_g, "g") },
        { key: "salt",          label: t("salt"),          value: formatNum(n.salt_g ?? n.sal_g, "g") },
        { key: "net",           label: t("net_quantity") || "Cantidad neta", value: cantidadNeta, plain: true },
      ];
      for (const r of rows) {
        if (r.value === null || r.value === "—") continue;
        const tr = document.createElement("tr");
        if (r.sub) tr.className = "sub";
        tr.innerHTML = `<th>${escapeHtml(r.label)}</th><td>${escapeHtml(r.value)}</td>`;
        tbl.appendChild(tr);
      }
      if (!tbl.children.length) {
        tbl.innerHTML = `<tr><td colspan="2" style="text-align:center;color:var(--ink-light);padding:8px 0;">—</td></tr>`;
      }
    }

    function formatEnergy(n) {
      const kj = n.energy_kj ?? n.energia_kj;
      const kcal = n.energy_kcal ?? n.energia_kcal;
      const parts = [];
      if (kj != null && kj !== "") parts.push(`${Math.round(Number(kj))} kJ`);
      if (kcal != null && kcal !== "") parts.push(`${Math.round(Number(kcal))} kcal`);
      return parts.length ? parts.join(" / ") : null;
    }

    function formatNum(v, unit) {
      if (v == null || v === "") return null;
      const n = Number(v);
      if (Number.isNaN(n)) return String(v);
      const text = n === 0 ? "0" : (n < 0.01 ? "<0.01" : n.toFixed(n < 1 ? 2 : 1));
      return `${text} ${unit}`;
    }

    function renderTech(w) {
      const dl = $("techGrid");
      dl.innerHTML = "";
      const add = (label, value) => {
        if (!value) return;
        const dt = document.createElement("dt");
        dt.textContent = label;
        const dd = document.createElement("dd");
        dd.textContent = value;
        dl.appendChild(dt);
        dl.appendChild(dd);
      };
      const abv = w.alcohol || w.graduacion_texto || w.graduacion;
      add(t("denomination") || "Denominación", w.denominacion);
      add(t("abv"), abv ? (String(abv).includes("%") ? abv : `${abv}% vol.`) : "");
      add(t("volume"), w.volumen || w.volume || w.volumen_texto);
      add(t("category"), w.categoria);
      add(t("origin_country") || t("origin"), w.origen || w.origin);
      add(t("provenance") || "Lugar de procedencia", w.procedencia);
      add(t("bottling_date") || "Fecha de embotellado", w.fecha_embotellado);
      add(t("conservation") || "Conservación", w.conservacion);
      add(t("bottler"), w.embotellador || w.bottler);
      add(t("operator") || "Operador alimentario", w.operador);
      add(t("lot"), w.lote || w.lot);
    }

    function renderPictograms(p) {
      const hero = $("pictosHero");
      const rec = $("recyclingRow");
      const attrs = $("attrsRow");
      hero.innerHTML = ""; rec.innerHTML = ""; attrs.innerHTML = "";

      // Pictogramas obligatorios arriba (estilo AECOC)
      // Orden: -18 · embarazada · no conducir
      if (p.no_minors !== false) { // por defecto sí (vino > 18)
        hero.appendChild(makeHeroPicto(ICONS.noMinors, t("warning_minors") || "+18"));
      }
      if (p.pregnancy !== false) {
        hero.appendChild(makeHeroPicto(ICONS.pregnancy, t("warning_pregnancy")));
      }
      if (p.no_drive !== false) { // opcional pero lo ponemos por defecto (puede desactivarse)
        hero.appendChild(makeHeroPicto(ICONS.noDrive, t("warning_drive")));
      }

      /* Wine in Moderation · opt-in por bodega/añada (default OFF).
         Solo se muestra si pictogramas.wine_moderation === true */
      const wimBadge = $("wineModerationBadge");
      if (wimBadge) wimBadge.style.display = p.wine_moderation === true ? "" : "none";

      // Recycling — icono triángulo con código dentro (universal)
      const r = p.recycling || {};
      const addRec = (code, label) => {
        if (!code) return;
        const el = document.createElement("div");
        el.className = "recycle-icon";
        el.innerHTML = `${ICONS.recycle(String(code))}<span>${escapeHtml(label)}</span>`;
        rec.appendChild(el);
      };
      addRec(r.glass, t("recycling_glass"));
      addRec(r.cap,   t("recycling_cap"));
      addRec(r.cork,  t("recycling_cork"));

      // Attribute icons — logos oficiales (V-Label vegan / V-Label vegetarian / EU Organic / Punto Verde)
      // con texto debajo. Reemplaza los chips por logos universales reconocibles.
      if (p.vegan)        attrs.appendChild(makeAttrIcon(ICONS.veganLogo,      t("vegan")));
      if (p.vegetarian)   attrs.appendChild(makeAttrIcon(ICONS.vegetarianLogo, t("vegetarian")));
      if (p.organic)      attrs.appendChild(makeAttrIcon(ICONS.organicLogo,    t("organic")));
      if (p.punto_verde)  attrs.appendChild(makeAttrIcon(ICONS.puntoVerdeLogo, t("punto_verde") || "Punto Verde"));

      // Certifications (logos subidos por la bodega: DOP, bio, V-Label, etc.)
      const certsRow = $("certsRow");
      certsRow.innerHTML = "";
      const certs = Array.isArray(WINE?.certificaciones) ? WINE.certificaciones : [];
      certs.forEach(c => {
        if (!c?.logo_url) return;
        const el = document.createElement("div");
        el.className = "cert-item";
        el.innerHTML = `<img src="${escapeHtml(c.logo_url)}" alt="${escapeHtml(c.nombre || "")}" loading="lazy"/><span>${escapeHtml(c.nombre || "")}</span>`;
        certsRow.appendChild(el);
      });

      /* Mostrar/ocultar cada bloque por separado · solo aparece la sección
         si tiene contenido. Consumo responsable siempre aparece (pictogramas
         obligatorios EU + Wine in Moderation institucional). */
      const sostenibilidadSec = $("sustainabilitySection");
      const reciclajeSec = $("recyclingSection");
      if (sostenibilidadSec) sostenibilidadSec.style.display = (attrs.children.length || certsRow.children.length) ? "" : "none";
      if (reciclajeSec) reciclajeSec.style.display = rec.children.length ? "" : "none";
    }

    function makeHeroPicto(svgMarkup, label) {
      const el = document.createElement("div");
      el.className = "picto-hero";
      el.innerHTML = svgMarkup + `<span>${escapeHtml(label || "")}</span>`;
      return el;
    }

    function makeBadge(txt, iconSvg = "") {
      const el = document.createElement("span");
      el.className = "attr-badge";
      el.innerHTML = `${iconSvg}<span>${escapeHtml(txt)}</span>`;
      return el;
    }

    /* Render del nuevo bloque vegan/vegetarian/organic: logo oficial + texto debajo.
       Misma estructura que las certificaciones de la bodega (.cert-item). */
    function makeAttrIcon(imgUrl, txt) {
      const el = document.createElement("div");
      el.className = "attr-icon";
      el.innerHTML = `<img src="${escapeHtml(imgUrl)}" alt="${escapeHtml(txt)}" loading="lazy" /><span>${escapeHtml(txt)}</span>`;
      return el;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
    }

    /* ─────────────────────────────────────────────────────────────
       Pictograma SVG (embarazadas tachada + coche tachado)
    ───────────────────────────────────────────────────────────────*/
    const ICONS = {
      /* Pictogramas v2 bicolor · círculo+barra rojo institucional (#c8102e),
         símbolo interior negro (-18 texto, embarazada y coche+copa OpenMoji
         silueta). Composición propia, SVG en B2.
         Si una bodega tiene assets oficiales OIVE/AECOC, sustituir las URLs
         a su carpeta dedicada manteniendo el mismo nombre de archivo. */
      noMinors: `<img src="https://f005.backblazeb2.com/file/SommelierLab-media/qr1/pictograms/v2-color/no_minors.png" alt="" loading="lazy" />`,
      pregnancy: `<img src="https://f005.backblazeb2.com/file/SommelierLab-media/qr1/pictograms/v2-color/pregnancy.png" alt="" loading="lazy" />`,
      noDrive: `<img src="https://f005.backblazeb2.com/file/SommelierLab-media/qr1/pictograms/v2-color/no_drive.png" alt="" loading="lazy" />`,
      // Mobius de reciclaje (ISO 7000-1135) — PNG oficial verde con codigo encima
      recycle: (code) => `<svg viewBox="0 0 100 93" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <image href="https://f005.backblazeb2.com/file/SommelierLab-media/qr1/pictograms/recycle.png" x="0" y="0" width="100" height="93" preserveAspectRatio="xMidYMid meet"/>
        <text x="50" y="49" text-anchor="middle" font-size="13" font-weight="800" fill="#1f9a3a" font-family="Helvetica, Arial, sans-serif" letter-spacing="-0.5">${escapeHtml(code)}</text>
      </svg>`,
      // Hoja simple (legacy · ya no se usa para vegan/vegetarian/organic — se sustituyó por logos oficiales)
      leaf: `<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M14 2c-5 0-9 2-10 7-1 4 1 5 1 5l1-3c0-3 2-5 5-6 1 0 2-1 3-3z"/>
      </svg>`,
      // Logos oficiales · V-Label vegan/vegetarian (Wikimedia Commons) + EU Organic (Eurohoja)
      veganLogo:      "https://f005.backblazeb2.com/file/SommelierLab-media/qr1/icons/vegan-logo.png",
      vegetarianLogo: "https://f005.backblazeb2.com/file/SommelierLab-media/qr1/icons/vegetarian-logo.png",
      organicLogo:    "https://f005.backblazeb2.com/file/SommelierLab-media/qr1/icons/organic-eurohoja.svg",
      // Punto Verde (Ecoembes) · acreditación de adhesión al sistema de gestión de envases.
      puntoVerdeLogo: "https://f005.backblazeb2.com/file/SommelierLab-media/qr1/icons/punto-verde.png",
      sun: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>`,
      moon: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>`,
    };

    /* ─────────────────────────────────────────────────────────────
       Idioma: selector + carga reactiva
    ───────────────────────────────────────────────────────────────*/
    function buildLangSelector(initial) {
      const sel = $("lang");
      // Orden por popularidad (primero los más usados; catalán/euskera/gallego arriba por ser tu mercado base)
      const topOrder = ["es","ca","eu","gl","en","fr","pt","it","de"];
      const rest = LANGS.filter(l => !topOrder.includes(l));
      const final = [...topOrder, ...rest].filter(l => LANGS.includes(l));
      sel.innerHTML = final.map(c => `<option value="${c}">${NATIVE[c] || c.toUpperCase()}</option>`).join("");
      sel.value = initial;
      sel.addEventListener("change", () => setLang(sel.value));
    }

    async function setLang(lang) {
      if (!inLangs(lang)) lang = "en";
      activeLang = lang;
      localStorage.setItem("qr1.lang", lang);
      const url = new URL(location.href);
      // Si el path es /legal/V/A/L, reescribimos el último segmento del path con el nuevo lang
      // y borramos cualquier ?lang= residual. Si no, fallback a querystring (modo legacy).
      const pathParts = url.pathname.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
      const isLegalPath = pathParts[0] === "legal" && pathParts.length >= 3;
      if (isLegalPath) {
        if (pathParts.length >= 4 && /^[a-z]{2}$/.test(pathParts[3])) {
          pathParts[3] = lang;
        } else {
          pathParts.push(lang);
        }
        url.pathname = "/" + pathParts.join("/");
        url.searchParams.delete("lang");
      } else {
        url.searchParams.set("lang", lang);
      }
      history.replaceState({}, "", url.toString());

      // En modo preview, avisar al dashboard padre para que re-fetche
      // los datos del vino traducidos al nuevo idioma (dry_run + langs:[lang]).
      // Sin esto la preview muestra UI traducida pero data en ES.
      if (PREVIEW_MODE) {
        try { (window.parent || window).postMessage({ type: "preview-lang-changed", app: "qr1", lang }, "*"); } catch {}
      }

      renderUI(); // labels UI

      // Recarga los datos del vino en el idioma elegido (con fallback EN/ES)
      try {
        const { data } = await loadWineData(lang);
        WINE = data;
        renderWine();
      } catch (e) {
        console.error("[QR1]", e);
      }
    }

    /* ─────────────────────────────────────────────────────────────
       Init
    ───────────────────────────────────────────────────────────────*/
    async function init() {
      // Timeout de seguridad: si renderWine no se ejecuta en 6s, ocultar splash igualmente
      setTimeout(() => {
        const sp = $("splash");
        if (sp && !sp.classList.contains("hide")) {
          sp.classList.add("hide");
          setTimeout(() => sp.remove(), 400);
        }
      }, 6000);

      await loadLabels();
      const initial = detectInitialLang();
      activeLang = initial;
      buildLangSelector(initial);

      // Tema: override de usuario si existe
      try {
        const saved = localStorage.getItem("qr1.theme");
        if (saved === "light" || saved === "dark") THEME_OVERRIDE = saved;
      } catch {}
      $("themeBtn")?.addEventListener("click", toggleTheme);
      applyThemeMode(resolveTheme());
      renderThemeBtn();

      if (PREVIEW_MODE) {
        // Escuchar datos del dashboard y avisar que estamos listos
        window.addEventListener("message", (ev) => {
          if (ev.data?.type === "preview-elabel" && ev.data.data) {
            PREVIEW_DATA = ev.data.data;
            WINE = PREVIEW_DATA;
            renderUI();
            renderWine();
          }
        });
        renderUI();
        try { (window.parent || window).postMessage({ type: "preview-ready", app: "qr1" }, "*"); } catch {}
        return;
      }

      await setLang(initial);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
