<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="No bebas si estas embarazada">
  <title>No bebas si estas embarazada</title>

  <!-- ============ SILUETA EMBARAZADA DE PERFIL (compuesta manualmente) ============
       Estilo señal vial: mujer de perfil mirando a la derecha, cabeza redonda,
       espalda recta a la izquierda, pecho marcado, barriga MUY prominente,
       brazo levantado con copa cerca de la boca, piernas hacia abajo.
       Silueta rellena en negro, dentro del area util del circulo (r=86 centrado en 100,100). -->

  <!-- Conjunto desplazado +5 en Y para que no choque con el circulo arriba. -->
  <g transform="translate(0 6)">
    <!-- Cabeza -->
    <circle cx="98" cy="52" r="10" fill="#111111"/>

    <!-- Cuerpo principal -->
    <path fill="#111111" d="
      M 92 60
      L 92 70
      C 91 78, 90 90, 90 102
      L 90 130
      C 90 138, 91 146, 92 156
      L 92 168
      L 100 168
      L 100 156
      L 104 156
      L 104 168
      L 112 168
      L 112 154
      C 113 146, 113 140, 113 132
      C 122 130, 130 122, 132 110
      C 134 96, 128 84, 116 80
      C 114 77, 113 73, 112 69
      C 112 67, 110 66, 108 66
      C 106 66, 105 67, 105 69
      C 104 64, 102 61, 99 60
      Z"/>

    <!-- Brazo levantado: pega al hombro y sube hasta cerca de la boca llevando copa -->
    <path fill="#111111" d="
      M 100 68
      C 95 70, 90 70, 86 67
      C 84 66, 82 64, 81 61
      C 80 58, 81 55, 84 54
      C 87 53, 90 55, 91 57
      L 96 64
      Z"/>

    <!-- Copa de vino cerca de la boca: cuenco + tallo + pie -->
    <path fill="#111111" d="
      M 72 40
      L 88 40
      L 88 44
      C 88 50, 85 54, 80 54
      C 75 54, 72 50, 72 44
      Z"/>
    <rect x="79" y="54" width="2" height="8" fill="#111111"/>
    <rect x="74" y="62" width="12" height="2" fill="#111111"/>
  </g>

  <!-- ============ CIRCULO + BARRA DE PROHIBICION ============ -->
  <g fill="none" stroke="#c8102e" stroke-width="14" stroke-linecap="butt">
    <circle cx="100" cy="100" r="86"/>
    <line x1="42" y1="42" x2="158" y2="158"/>
  </g>
</svg>
