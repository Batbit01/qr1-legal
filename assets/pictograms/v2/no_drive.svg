<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="No conduzcas si bebes">
  <title>No conduzcas si bebes</title>

  <!-- Conjunto subido para no chocar con la barra diagonal. -->
  <g transform="translate(0 -10)">
    <!-- ============ COCHE silueta lateral RELLENA (izquierda) ============ -->
    <g fill="#111111">
      <!-- Carroceria: capó bajo a la izquierda, cabina central elevada, maletero a la derecha -->
      <path d="
        M 35 118
        L 35 108
        C 35 105, 37 103, 40 102
        L 50 100
        L 58 88
        C 60 85, 63 84, 67 84
        L 82 84
        C 86 84, 89 85, 91 88
        L 97 100
        L 102 102
        C 104 103, 105 105, 105 108
        L 105 118
        Z"/>
      <!-- Rueda izquierda -->
      <circle cx="50" cy="120" r="9"/>
      <!-- Rueda derecha -->
      <circle cx="92" cy="120" r="9"/>
    </g>
    <!-- Huecos blancos dentro de las ruedas para llanta -->
    <circle cx="50" cy="120" r="3" fill="#ffffff"/>
    <circle cx="92" cy="120" r="3" fill="#ffffff"/>

    <!-- ============ COPA DE VINO silueta RELLENA (derecha) ============ -->
    <g fill="#111111">
      <!-- Cuenco -->
      <path d="
        M 130 78
        L 168 78
        C 168 92, 162 104, 149 106
        C 136 104, 130 92, 130 78
        Z"/>
      <!-- Tallo -->
      <rect x="147" y="106" width="4" height="22"/>
      <!-- Pie -->
      <rect x="135" y="128" width="28" height="4" rx="2"/>
    </g>
  </g>

  <!-- ============ CIRCULO + BARRA DE PROHIBICION ============ -->
  <g fill="none" stroke="#c8102e" stroke-width="14" stroke-linecap="butt">
    <circle cx="100" cy="100" r="86"/>
    <line x1="42" y1="42" x2="158" y2="158"/>
  </g>
</svg>
